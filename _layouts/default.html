<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">

  <!-- Google Fonts: Bebas Neue + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Feed -->
  {% feed_meta %}
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">{{ site.title }}</a>
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        {% for page_item in site.header_pages %}
          {% assign pg = site.pages | where: "path", page_item | first %}
          {% if pg %}
          <li><a href="{{ pg.url | relative_url }}" {% if page.url == pg.url %}class="active"{% endif %}>{{ pg.title }}</a></li>
          {% endif %}
        {% endfor %}
      </ul>
    </div>
  </nav>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }}</p>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('.nav-links').classList.toggle('open');
      this.classList.toggle('open');
    });
  </script>

</body>
</html>
